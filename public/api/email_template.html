<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 40px 20px;
            text-align: center;
            color: #ffffff;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .content {
            padding: 40px;
        }

        .field {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
        }

        .value {
            font-size: 16px;
            color: #1e293b;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .message-box {
            white-space: pre-wrap;
            min-height: 100px;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>New Message Received</h1>
        </div>
        <div class="content">
            <div class="field">
                <span class="label">From</span>
                <div class="value">{{name}}</div>
            </div>
            <div class="field">
                <span class="label">Email</span>
                <div class="value">{{email}}</div>
            </div>
            <div class="field">
                <span class="label">Subject</span>
                <div class="value">{{subject}}</div>
            </div>
            <div class="field">
                <span class="label">Message</span>
                <div class="value message-box">{{message}}</div>
            </div>
        </div>
        <div class="footer">
            This email was sent from your website's contact form.
        </div>
    </div>
</body>

</html>
